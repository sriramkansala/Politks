function openState(stateName, feature, noData = false) {
  NAV_STATE.level = 'state';
  NAV_STATE.stateName = stateName;
  NAV_STATE.constituency = null;
  NAV_STATE.politicianId = null;
  NAV_STATE.selectedFeature = feature;
  panel.classList.remove('wide');

  myGlobe.polygonCapColor(myGlobe.polygonCapColor())
         .polygonAltitude(myGlobe.polygonAltitude())
         .polygonStrokeColor(myGlobe.polygonStrokeColor());

  const c = featureCentroid(feature);
  if (c) myGlobe.pointOfView({ lat: c.lat, lng: c.lng, altitude: 0.5 }, 1500);

  const data = STATES[stateName];

  if (!data) {
    // Render minimal placeholder view
    const partyCode = partyForState(stateName);
    const party = PARTIES[partyCode];
    renderBody(`
      <h1 class="h-serif h1">${stateName}</h1>
      <div style="margin-top:8px;">
        <span class="party-chip" style="background:${hexA(party.color, 0.18)};color:${party.color};border-color:${hexA(party.color, 0.35)}">
          <span class="sq" style="background:${party.color}"></span>${party.short}
        </span>
        <span style="color:var(--text-tertiary);margin-left:8px;font-size:11px;">${party.name}</span>
      </div>
      <div class="section">
        <div class="section-title">No sample data</div>
        <p style="color:var(--text-tertiary);font-size:12px;">Detailed profiles for this state are not seeded in the demo. Connect ADR / MyNeta / PRS APIs to populate.</p>
      </div>
    `);
    openPanel();
    renderPartyPanel(partyCode, stateName);
    updateBreadcrumb();
    return;
  }

  const party = PARTIES[data.party];
  const cm = POLITICIANS[data.cm];

  // ── Organisation tab: org-chart with CM at the top, Cabinet row, Constituencies row ──
  const cabinetExCm = data.cabinet.filter(pid => pid !== data.cm);
  const cabinetBoxes = cabinetExCm.length
    ? cabinetExCm.map(pid => {
        const p = POLITICIANS[pid];
        const role = p.position.split('·')[0].trim();
        return `
          <div class="org-box" data-goto-p="${pid}">
            <div class="role-label">${role}</div>
            <div class="name">${p.name}</div>
            ${p.constituency ? `<div class="sub">${p.constituency}</div>` : ''}
          </div>`;
      }).join('')
    : `<div style="color:var(--text-disabled);font-size:11px;padding:6px;">Cabinet details not seeded.</div>`;

  const constituencyBoxes = Object.entries(data.constituencies).map(([cName, c]) => `
    <div class="org-box" data-goto-c="${cName}">
      <div class="role-label">Constituency</div>
      <div class="name">${cName}</div>
      <div class="sub">${c.district}</div>
    </div>
  `).join('');

  const orgChartHtml = `
    <div class="org-chart">
      <div class="org-box head" data-goto-p="${data.cm}">
        <div class="role-label">Chief Minister</div>
        <div class="name">${cm.name}</div>
        <div class="sub">${party.short} · ${stateName}</div>
      </div>
      <div class="org-connector"></div>
      <div class="org-group">
        <div class="org-group-title">Cabinet · ${cabinetExCm.length}</div>
        <div class="org-row">${cabinetBoxes}</div>
      </div>
      <div class="org-group">
        <div class="org-group-title">Constituencies · ${Object.keys(data.constituencies).length}</div>
        <div class="org-row">${constituencyBoxes}</div>
      </div>
    </div>`;

  // ── News tab ──
  const newsHtml = data.news.map(n => `
    <div class="news-item">
      <div class="headline">${n.headline}</div>
      <div class="meta">
        <span>${n.source}</span>
        <span style="color:var(--text-disabled)">·</span>
        <span>${n.date}</span>
        <span class="sent-dot sent-${n.sentiment}"></span>
      </div>
    </div>`).join('');

  // ── Donations tab: top electoral-bond donors to this state's parties ──
  const stateDonors = (typeof STATE_DONATIONS === 'object' && STATE_DONATIONS[stateName]) || [];
  const totalCr = stateDonors.reduce((s, d) => s + (d.amount_cr || 0), 0);
  const maxCr   = stateDonors.reduce((m, d) => Math.max(m, d.amount_cr || 0), 1);

  const donationsHtml = stateDonors.length
    ? `<div class="donor-list">
        ${stateDonors
          .slice()
          .sort((a, b) => b.amount_cr - a.amount_cr)
          .map(d => {
            const recip = PARTIES[d.party] || { color: 'var(--accent)', short: d.party };
            const widthPct = Math.max(6, Math.round((d.amount_cr / maxCr) * 100));
            return `
              <div class="donor-row">
                <div class="donor-head">
                  <div class="donor-name">${d.donor}</div>
                  <div class="donor-amt">₹${d.amount_cr.toLocaleString('en-IN')} cr</div>
                </div>
                <div class="donor-bar">
                  <div class="donor-bar-fill" style="width:${widthPct}%;background:${recip.color};"></div>
                </div>
                <div class="donor-meta">
                  <span>→</span>
                  <span class="party-chip" style="background:${hexA(recip.color, 0.18)};color:${recip.color};border-color:${hexA(recip.color, 0.35)};padding:1px 5px;font-size:9px;">
                    <span class="sq" style="background:${recip.color};width:5px;height:5px;"></span>${recip.short}
                  </span>
                  ${d.probe ? `<span class="probe">⚠ ED probe</span>` : ''}
                  ${d.note ? `<span style="color:var(--text-disabled);">· ${d.note}</span>` : ''}
                </div>
              </div>`;
          }).join('')}
      </div>
      <div class="donations-caveat">
        <strong style="color:var(--text-secondary);">Source.</strong>
        SBI / ECI release of 15 Feb 2024 after the Supreme Court struck down
        the electoral bond scheme 5-0. Per-state attribution is illustrative —
        bonds are nationally-purchased; figures here slice top-line donor totals
        to the state's major parties. Total shown: ₹${totalCr.toLocaleString('en-IN')} cr.
      </div>`
    : `<p style="color:var(--text-tertiary);font-size:12px;">No bond-donor data seeded for this state yet.</p>`;

  // Surface the CM's politician profile at Level 1 right panel.
  // The user clicked a state — show the head of government in full,
  // with the state context tucked underneath.
  NAV_STATE.politicianId = data.cm;
  // Always land on Overview when entering a new state so the
  // education + political history sections are immediately visible.
  NAV_STATE.tab = 'overview';

  const cmTabsHtml = TAB_NAMES
    .filter(t => t.k !== 'network') // hide power-network here; available in level 3
    .map(t => `
      <button class="tab-btn${t.k === NAV_STATE.tab ? ' active' : ''}" data-tab="${t.k}">${t.label}</button>
    `).join('');

  // ── LEFT PANEL: state info (party chip, CM card, stats, organisation, news) ──
  renderLeftBody(`
    <div style="padding: 18px 22px 8px;">
      <h1 class="h-serif h1" style="margin:0 0 10px;">${stateName}</h1>
      <div>
        <span class="party-chip" style="background:${hexA(party.color, 0.18)};color:${party.color};border-color:${hexA(party.color, 0.35)}">
          <span class="sq" style="background:${party.color}"></span>${party.short}
        </span>
        <span style="color:var(--text-tertiary);margin-left:8px;font-size:11px;">${party.name}</span>
      </div>

      <div class="stat-grid">
        <div class="stat"><div class="v">${data.mpCount}</div><div class="k">MP seats</div></div>
        <div class="stat"><div class="v">${data.mlaCount}</div><div class="k">MLA seats</div></div>
        <div class="stat"><div class="v">${data.population}</div><div class="k">Population</div></div>
        <div class="stat"><div class="v">${data.literacy}</div><div class="k">Literacy</div></div>
      </div>

      <div class="tabs" id="leftTabs">
        <button class="tab-btn active" data-ltab="org">Organisation</button>
        <button class="tab-btn" data-ltab="news">News</button>
        <button class="tab-btn" data-ltab="donations">Donations</button>
      </div>
      <div class="left-tab-body" id="leftTabBody"></div>
    </div>
  `);
  openLeftPanel();

  // Tab content lookup
  const LEFT_TABS = {
    org: orgChartHtml,
    news: newsHtml || `<p style="color:var(--text-tertiary);font-size:12px;">No recent news.</p>`,
    donations: donationsHtml
  };

  const leftTabBody = document.getElementById('leftTabBody');
  function renderLeftTab(key) {
    leftTabBody.innerHTML = LEFT_TABS[key] || '';
    // Restart fade
    leftTabBody.style.animation = 'none';
    void leftTabBody.offsetWidth;
    leftTabBody.style.animation = '';

    // Rewire drill-ins for the freshly-rendered content
    leftTabBody.querySelectorAll('[data-goto-p]').forEach(el => {
      el.addEventListener('click', () => openPolitician(el.dataset.gotoP));
    });
    leftTabBody.querySelectorAll('[data-goto-c]').forEach(el => {
      el.addEventListener('click', () => openConstituency(stateName, el.dataset.gotoC));
    });
  }

  // Wire tab buttons
  document.querySelectorAll('#leftTabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#leftTabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLeftTab(btn.dataset.ltab);
    });
  });

  // CM card was previously rendered at the top of the left panel; removed
  // because the right panel already shows the CM profile in full. The
  // constituency view (openConstituency) still renders cm-card for MLA/MP.

  // Initial tab
  renderLeftTab('org');

  // ── RIGHT PANEL: CM politician profile (tabs) ─────────────────────────
  renderBody(`
    <div class="pol-header">
      <div class="photo" style="background-image:url('${cm.photo}');"></div>
      <div>
        <div class="name">${cm.name}</div>
        <div class="meta">
          <span class="party-chip" style="background:${hexA(party.color, 0.18)};color:${party.color};border-color:${hexA(party.color, 0.35)}">
            <span class="sq" style="background:${party.color}"></span>${party.short}
          </span>
          <span class="dot">·</span>
          <span>Chief Minister · ${stateName}</span>
        </div>
        <div class="meta">
          <span>${cm.constituency}</span>
          <span class="dot">·</span>
          <span>Age ${cm.age}</span>
          <span class="dot">·</span>
          <span>${cm.yearsInOffice} years</span>
        </div>
      </div>
    </div>

    <div class="approval-gauge">
      <div class="label" style="margin:0;width:78px;">Approval</div>
      <div class="gauge-bar"><div class="gauge-fill" style="width:${cm.approval}%"></div></div>
      <div class="val">${cm.approval}%</div>
      <div class="trend ${cm.trend}">${cm.trend==='up'?'↑':cm.trend==='down'?'↓':'→'}</div>
    </div>

    <div class="tabs">${cmTabsHtml}</div>
    <div class="tab-body" id="tabBody"></div>
  `);

  // Wire tab buttons (uses existing switchTab; politicianId already set above)
  panelBody.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
  switchTab(NAV_STATE.tab);

  // Wire any drill-ins inside the right panel
  panelBody.querySelectorAll('[data-goto-p]').forEach(el => {
    el.addEventListener('click', () => openPolitician(el.dataset.gotoP));
  });
  panelBody.querySelectorAll('[data-goto-c]').forEach(el => {
    el.addEventListener('click', () => openConstituency(stateName, el.dataset.gotoC));
  });

  openPanel();
  updateBreadcrumb();
}

/* ──────────────────────────────────────────────────────────────────────────
   LEVEL 2 — CONSTITUENCY VIEW
   ────────────────────────────────────────────────────────────────────────── */

function openConstituency(stateName, cName) {
  NAV_STATE.level = 'constituency';
  NAV_STATE.stateName = stateName;
  NAV_STATE.constituency = cName;
  NAV_STATE.politicianId = null;
  panel.classList.remove('wide');

  const data = STATES[stateName]?.constituencies?.[cName];
  if (!data) {
    renderBody(`<p style="color:var(--text-tertiary)">No constituency data available.</p>`);
    openPanel();
    updateBreadcrumb();
    return;
  }
  const mla = POLITICIANS[data.mla];
  const mp  = POLITICIANS[data.mp];

  const card = (label, p) => p ? `
    <div class="cm-card" data-goto-p="${p === POLITICIANS[data.mla] ? data.mla : data.mp}">
      <div class="avatar" style="background-image:url('${p.photo}');"></div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="role">${label} · ${p.party}</div>
      </div>
    </div>` : '';

  renderBody(`
    <h1 class="h-serif h2">${cName}</h1>
    <div class="mono" style="color:var(--text-tertiary);font-size:11px;margin-top:4px;">
      ${data.district} District · ${stateName}
    </div>

    <div class="stat-grid">
      <div class="stat"><div class="v">${data.electorate}</div><div class="k">Electorate</div></div>
      <div class="stat"><div class="v">${data.turnout}</div><div class="k">Last turnout</div></div>
    </div>

    <div class="section">
      <div class="section-title">Representatives</div>
      ${card('MLA', mla)}
      ${card('MP',  mp)}
    </div>
  `);

  panelBody.querySelectorAll('[data-goto-p]').forEach(el => {
    el.addEventListener('click', () => openPolitician(el.dataset.gotoP));
  });

  openPanel();
  // Keep the left party panel synced with the state we're in
  const stateData = STATES[stateName];
  if (stateData) renderPartyPanel(stateData.party, stateName);
  updateBreadcrumb();
}

/* ──────────────────────────────────────────────────────────────────────────
   LEVEL 3 — POLITICIAN PROFILE with tabs
   ────────────────────────────────────────────────────────────────────────── */

const TAB_NAMES = [
  { k: 'overview', label: 'Overview' },
  { k: 'promises', label: 'Promises' },
  { k: 'legal',    label: 'Legal Record' },
  { k: 'news',     label: 'News' },
  { k: 'network',  label: 'Power Network' }
];

function openPolitician(pid) {
  const p = POLITICIANS[pid];
  if (!p) return;
  NAV_STATE.level = 'politician';
  NAV_STATE.politicianId = pid;
  NAV_STATE.stateName = NAV_STATE.stateName || p.state;
  NAV_STATE.tab = NAV_STATE.tab === 'network' ? 'overview' : NAV_STATE.tab;
  panel.classList.remove('wide');

  const party = PARTIES[p.party];

  const tabsHtml = TAB_NAMES.map(t => `
    <button class="tab-btn${t.k === NAV_STATE.tab ? ' active' : ''}" data-tab="${t.k}">${t.label}</button>
  `).join('');

  renderBody(`
    <div class="pol-header">
      <div class="photo" style="background-image:url('${p.photo}');"></div>
      <div>
        <div class="name">${p.name}</div>
        <div class="meta">
          <span class="party-chip" style="background:${hexA(party.color, 0.18)};color:${party.color};border-color:${hexA(party.color, 0.35)}">
            <span class="sq" style="background:${party.color}"></span>${party.short}
          </span>
          <span class="dot">·</span>
          <span>${p.position}</span>
        </div>
        <div class="meta">
          <span>${p.constituency}</span>
          <span class="dot">·</span>
          <span>Age ${p.age}</span>
          <span class="dot">·</span>
          <span>${p.yearsInOffice} years</span>
        </div>
      </div>
    </div>

    <div class="approval-gauge">
      <div class="label" style="margin:0;width:78px;">Approval</div>
      <div class="gauge-bar"><div class="gauge-fill" style="width:${p.approval}%"></div></div>
      <div class="val">${p.approval}%</div>
      <div class="trend ${p.trend}">${p.trend==='up'?'↑':p.trend==='down'?'↓':'→'}</div>
    </div>

    <div class="tabs">${tabsHtml}</div>
    <div class="tab-body" id="tabBody"></div>
  `);

  panelBody.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });

  switchTab(NAV_STATE.tab);
  openPanel();
  // Sync party panel with politician's party
  renderPartyPanel(p.party, NAV_STATE.stateName);
  updateBreadcrumb();
}

function switchTab(name) {
  NAV_STATE.tab = name;
  panelBody.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });

  // Toggle panel width for network
  if (name === 'network') panel.classList.add('wide');
  else panel.classList.remove('wide');

  const tb = document.getElementById('tabBody');
  if (!tb) return;
  tb.classList.remove('tab-body');
  void tb.offsetWidth;
  tb.classList.add('tab-body');

  const p = POLITICIANS[NAV_STATE.politicianId];
  if (!p) return;

  switch (name) {
    case 'overview': tb.innerHTML = renderOverviewTab(p); break;
    case 'promises': tb.innerHTML = renderPromisesTab(p); break;
    case 'legal':    tb.innerHTML = renderLegalTab(p);    break;
    case 'news':     tb.innerHTML = renderNewsTab(p);     break;
    case 'network':  renderNetworkTab(p, tb);             break;
  }
}

function renderOverviewTab(p) {
  const respChips = p.overview.responsibilities.map(r =>
    `<span class="party-chip" style="background:var(--bg-elev-2);color:var(--text-secondary);border-color:var(--border);margin:2px 4px 2px 0;">${r}</span>`
  ).join('');
  const achievements = p.overview.achievements.map(a =>
    `<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
       <span class="mono" style="color:var(--text-tertiary);min-width:60px;">${a.d}</span>
       <span>${a.t}</span>
     </div>`).join('');

  // Education history rows
  const eduRows = (p.education ?? []).map(e => `
    <div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
      <span class="mono" style="color:var(--text-tertiary);min-width:80px;">${e.years ?? ''}</span>
      <span><span style="color:var(--text-primary);">${e.degree ?? ''}</span><span style="color:var(--text-tertiary);"> · ${e.institution ?? ''}</span></span>
    </div>`).join('');
  const eduHtml = eduRows ||
    `<p style="color:var(--text-tertiary);font-size:12px;">No education data on record.</p>`;

  // Political history rows
  const polRows = (p.politicalHistory ?? []).map(h => `
    <div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
      <span class="mono" style="color:var(--text-tertiary);min-width:80px;">${h.years ?? ''}</span>
      <span><span style="color:var(--text-primary);">${h.role ?? ''}</span>${h.org ? `<span style="color:var(--text-tertiary);"> · ${h.org}</span>` : ''}</span>
    </div>`).join('');
  const polHtml = polRows ||
    `<p style="color:var(--text-tertiary);font-size:12px;">No political history on record.</p>`;

  return `
    <div class="sub-section-title">Responsibilities</div>
    <div>${respChips}</div>

    <div class="sub-section-title">Education history</div>
    <div>${eduHtml}</div>

    <div class="sub-section-title">Political history</div>
    <div>${polHtml}</div>

    <div class="sub-section-title">Achievements</div>
    <div>${achievements}</div>

    <div class="sub-section-title">Assets & Liabilities <span class="mono" style="text-transform:none;color:var(--text-disabled);font-size:9px;">ADR · affidavit-style</span></div>
    <div class="assets-row"><span class="k">Movable + immovable assets</span><span class="v">${p.overview.assets}</span></div>
    <div class="assets-row"><span class="k">Disclosed liabilities</span><span class="v">${p.overview.liabilities}</span></div>
    <div class="assets-row"><span class="k">Criminal cases declared</span><span class="v">${p.overview.cases}</span></div>
  `;
}

function renderPromisesTab(p) {
  if (!p.promises?.length) return `<p style="color:var(--text-tertiary)">No promises tracked.</p>`;
  const rows = p.promises.map(pr => `
    <div class="promise-row">
      <span>${pr.t}</span>
      <span class="status-pl ${pr.s}">${pr.s === 'progress' ? 'In progress' : pr.s}</span>
    </div>`).join('');
  return `<div class="sub-section-title">Manifesto promises</div>${rows}`;
}

function renderLegalTab(p) {
  const section = (title, arr) => {
    if (!arr.length) return `<div class="sub-section-title">${title}</div><p style="color:var(--text-tertiary);font-size:12px;">None declared.</p>`;
    return `<div class="sub-section-title">${title}</div>` + arr.map(c => `
      <div class="case-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div class="title">${c.issue}</div>
          <span class="case-status ${c.status}">${c.status}</span>
        </div>
        <div class="meta">
          <span>${c.no}</span>
          <span style="color:var(--text-disabled)">·</span>
          <span>${c.court}</span>
          <span style="color:var(--text-disabled)">·</span>
          <span>Filed ${c.filed}</span>
        </div>
      </div>`).join('');
  };
  return `
    ${section('Criminal cases', p.legal.criminal)}
    ${section('Civil cases', p.legal.civil)}
    ${section('Pending judicial matters', p.legal.pending)}
  `;
}

function renderNewsTab(p) {
  if (!p.news?.length) return `<p style="color:var(--text-tertiary)">No news items.</p>`;
  return p.news.map(n => `
    <div class="news-item">
      <div class="headline">${n.headline}</div>
      <div class="meta">
        <span>${n.source}</span>
        <span style="color:var(--text-disabled)">·</span>
        <span>${n.date}</span>
        <span class="sent-dot sent-${n.sentiment}"></span>
      </div>
    </div>`).join('');
}

/* ──────────────────────────────────────────────────────────────────────────
   POWER NETWORK TAB — the headline feature
   ────────────────────────────────────────────────────────────────────────── */

const NET_STATE = {
  mode:    'all',      // 'all' | 'media' | 'party-business' | 'cross'
  hops:    2,
  weightMin: 0,
  enabledTypes: new Set(['politician','party','media','businessman','business_group','family']),
  pivot:   null,       // current center node id (defaults to politician id)
  pivotStack: [],      // history
  traceMode: false,
  traceStart: null,
  tracePath: null
};

function renderNetworkTab(politician, tb) {
  NET_STATE.pivot = politician.id || NAV_STATE.politicianId;
  NET_STATE.pivotStack = [];

  tb.innerHTML = `
    <div class="network-toolbar">
      <button class="mode-btn ${NET_STATE.mode==='all'?'active':''}"             data-mode="all">All</button>
      <button class="mode-btn ${NET_STATE.mode==='media'?'active':''}"           data-mode="media">Media Ownership</button>
      <button class="mode-btn ${NET_STATE.mode==='party-business'?'active':''}" data-mode="party-business">Party-Business Ties</button>
      <button class="mode-btn ${NET_STATE.mode==='cross'?'active':''}"           data-mode="cross">Cross-Ownership</button>
    </div>

    <div class="filter-row">
      <span class="lbl">Hops</span>
      <button class="hop-chip ${NET_STATE.hops===1?'active':''}" data-hop="1">1</button>
      <button class="hop-chip ${NET_STATE.hops===2?'active':''}" data-hop="2">2</button>
      <button class="hop-chip ${NET_STATE.hops===3?'active':''}" data-hop="3">3</button>

      <span class="lbl" style="margin-left:6px;">Weight ≥</span>
      <input class="weight-slider" type="range" min="0" max="100" value="${NET_STATE.weightMin}" />
      <span class="mono" id="wVal">${NET_STATE.weightMin}</span>

      <span class="lbl" style="margin-left:6px;">Types</span>
      <button class="toggle-chip ${NET_STATE.enabledTypes.has('politician')?'active':''}"      data-type="politician"><span class="sw" style="background:#e8edf3"></span>politician</button>
      <button class="toggle-chip ${NET_STATE.enabledTypes.has('party')?'active':''}"            data-type="party"><span class="sw" style="background:var(--p-INC)"></span>party</button>
      <button class="toggle-chip ${NET_STATE.enabledTypes.has('media')?'active':''}"            data-type="media"><span class="sw" style="background:#f4b942"></span>media</button>
      <button class="toggle-chip ${NET_STATE.enabledTypes.has('businessman')?'active':''}"      data-type="businessman"><span class="sw" style="background:#9b6fff"></span>businessman</button>
      <button class="toggle-chip ${NET_STATE.enabledTypes.has('business_group')?'active':''}"   data-type="business_group"><span class="sw" style="background:#6aa0ff"></span>group</button>
      <button class="toggle-chip ${NET_STATE.enabledTypes.has('family')?'active':''}"            data-type="family"><span class="sw" style="background:#888"></span>family</button>
    </div>

    <div class="network-stage" id="netStage"></div>

    <div class="section">
      <div class="section-title">Shared interests — outlets where party + donors + powerful businessmen overlap</div>
      <div id="sharedTable"></div>
    </div>
  `;

  tb.querySelectorAll('[data-mode]').forEach(b => {
    b.addEventListener('click', () => {
      NET_STATE.mode = b.dataset.mode;
      tb.querySelectorAll('[data-mode]').forEach(bb => bb.classList.toggle('active', bb === b));
      drawNetwork();
    });
  });
  tb.querySelectorAll('[data-hop]').forEach(b => {
    b.addEventListener('click', () => {
      NET_STATE.hops = parseInt(b.dataset.hop, 10);
      tb.querySelectorAll('[data-hop]').forEach(bb => bb.classList.toggle('active', bb === b));
      drawNetwork();
    });
  });
  tb.querySelectorAll('[data-type]').forEach(b => {
    b.addEventListener('click', () => {
      const t = b.dataset.type;
      if (NET_STATE.enabledTypes.has(t)) NET_STATE.enabledTypes.delete(t);
      else NET_STATE.enabledTypes.add(t);
      b.classList.toggle('active');
      drawNetwork();
    });
  });
  tb.querySelector('.weight-slider').addEventListener('input', e => {
    NET_STATE.weightMin = parseInt(e.target.value, 10);
    document.getElementById('wVal').textContent = NET_STATE.weightMin;
    drawNetwork();
  });

  drawNetwork();
  renderSharedInterests(politician);
}

/* ── Build unified graph from DATA ─────────────────────────────────────── */

function buildGraph() {
  const nodes = [];
  // Politicians
  Object.entries(POLITICIANS).forEach(([id, p]) => {
    nodes.push({
      id, type: 'politician', name: p.name,
      color: PARTIES[p.party]?.color || '#e8edf3',
      r: 12, party: p.party,
      sub: p.position
    });
  });
  // Parties
  Object.entries(PARTIES).forEach(([id, pa]) => {
    nodes.push({
      id, type: 'party', name: pa.name,
      color: pa.color, r: 14, sub: pa.short
    });
  });
  // Entities
  Object.entries(ENTITIES).forEach(([id, e]) => {
    let color = '#888', r = 10;
    if (e.type === 'media')          { color = '#f4b942'; r = 11; }
    if (e.type === 'businessman')    { color = '#9b6fff'; r = 11; }
    if (e.type === 'business_group') { color = '#6aa0ff'; r = 13; }
    if (e.type === 'family')         { color = '#888';    r = 8;  }
    nodes.push({
      id, type: e.type, subType: e.subType, name: e.name,
      color, r, sub: e.description || ''
    });
  });
  const links = RELATIONSHIPS.map((r, i) => ({
    id: `lnk_${i}`,
    source: r.from, target: r.to,
    type: r.type, weight: r.weight, note: r.note, refSource: r.source
  }));
  return { nodes, links };
}

const FULL_GRAPH = buildGraph();
const NODE_BY_ID = new Map(FULL_GRAPH.nodes.map(n => [n.id, n]));

/* ── Adjacency (undirected for BFS / triangle detection) ──────────────── */

function adjacency(links) {
  const adj = new Map();
  links.forEach(l => {
    const a = typeof l.source === 'string' ? l.source : l.source.id;
    const b = typeof l.target === 'string' ? l.target : l.target.id;
    if (!adj.has(a)) adj.set(a, new Set());
    if (!adj.has(b)) adj.set(b, new Set());
    adj.get(a).add(b);
    adj.get(b).add(a);
  });
  return adj;
}

function bfsLimit(startId, maxHops, adj) {
  const visited = new Map([[startId, 0]]);
  const q = [startId];
  while (q.length) {
    const cur = q.shift();
    const d = visited.get(cur);
    if (d >= maxHops) continue;
    for (const nx of adj.get(cur) || []) {
      if (visited.has(nx)) continue;
      visited.set(nx, d + 1);
      q.push(nx);
    }
  }
  return visited;
}

function shortestPath(startId, endId, adj) {
  if (startId === endId) return [startId];
  const prev = new Map([[startId, null]]);
  const q = [startId];
  while (q.length) {
    const cur = q.shift();
    if (cur === endId) {
      const path = [];
      let x = endId;
      while (x !== null) { path.unshift(x); x = prev.get(x); }
      return path;
    }
    for (const nx of adj.get(cur) || []) {
      if (prev.has(nx)) continue;
      prev.set(nx, cur);
      q.push(nx);
    }
  }
  return null;
}

/* ── Filtering by mode + type + weight ─────────────────────────────────── */

function filterGraph() {
  let nodes = FULL_GRAPH.nodes.slice();
  let links = FULL_GRAPH.links.slice();

  // Weight threshold (donor/owns only — relationship-membership/family is always shown)
  links = links.filter(l => {
    if (['member of','family of','ally / coalition partner'].includes(l.type)) return true;
    return (l.weight ?? 0) >= NET_STATE.weightMin;
  });

  // Mode filtering
  if (NET_STATE.mode === 'media') {
    // Only media-related edges: owns/donor where target is media; advertising client; cross-media
    links = links.filter(l => {
      const tgt = NODE_BY_ID.get(typeof l.target==='string'?l.target:l.target.id);
      const src = NODE_BY_ID.get(typeof l.source==='string'?l.source:l.source.id);
      return tgt?.type==='media' || src?.type==='media' ||
             (l.type==='advertising client');
    });
  } else if (NET_STATE.mode === 'party-business') {
    links = links.filter(l => {
      const tgt = NODE_BY_ID.get(typeof l.target==='string'?l.target:l.target.id);
      const src = NODE_BY_ID.get(typeof l.source==='string'?l.source:l.source.id);
      const ts = [src?.type, tgt?.type];
      return ts.includes('party') && (ts.includes('businessman') || ts.includes('business_group'));
    });
  } else if (NET_STATE.mode === 'cross') {
    // Filter to nodes involved in any party-businessman-media triangle.
    // Always preserve the pivot + its immediate neighbours so the politician
    // remains visible as an entry point into the triangle subgraph.
    const tri = findTriangles(FULL_GRAPH);
    const keep = new Set();
    tri.forEach(t => t.forEach(n => keep.add(n)));
    keep.add(NET_STATE.pivot);
    const adjFull = adjacency(FULL_GRAPH.links);
    for (const nb of adjFull.get(NET_STATE.pivot) || []) keep.add(nb);
    nodes = nodes.filter(n => keep.has(n.id));
    const nodeIds = new Set(nodes.map(n => n.id));
    links = links.filter(l => {
      const s = typeof l.source==='string'?l.source:l.source.id;
      const t = typeof l.target==='string'?l.target:l.target.id;
      return nodeIds.has(s) && nodeIds.has(t);
    });
  }

  // Type filter
  nodes = nodes.filter(n => {
    if (n.id === NET_STATE.pivot) return true;
    return NET_STATE.enabledTypes.has(n.type);
  });
  const ids = new Set(nodes.map(n => n.id));
  links = links.filter(l => {
    const s = typeof l.source==='string'?l.source:l.source.id;
    const t = typeof l.target==='string'?l.target:l.target.id;
    return ids.has(s) && ids.has(t);
  });

  // Hop limit from pivot
  const adj = adjacency(links);
  const within = bfsLimit(NET_STATE.pivot, NET_STATE.hops, adj);
  nodes = nodes.filter(n => within.has(n.id));
  const ids2 = new Set(nodes.map(n => n.id));
  links = links.filter(l => {
    const s = typeof l.source==='string'?l.source:l.source.id;
    const t = typeof l.target==='string'?l.target:l.target.id;
    return ids2.has(s) && ids2.has(t);
  });

  return { nodes, links };
}

/* ── Triangle detection: party ↔ businessman/business-group ↔ media ──── */

function findTriangles(graph) {
  // Detects two flavours of the party ↔ businessman ↔ media triangle:
  //   1. party — businessman — media  (direct)
  //   2. party — businessman — business_group — media  (chained via group, the
  //      common pattern when a promoter holds media through a holdco)
  // Returns chains as arrays of node ids; every node in any chain is "in" the
  // cross-ownership subgraph.
  const adj = adjacency(graph.links);
  const triangles = [];
  for (const a of graph.nodes) {
    if (a.type !== 'party') continue;
    for (const bId of adj.get(a.id) || []) {
      const b = NODE_BY_ID.get(bId);
      if (!b || (b.type !== 'businessman' && b.type !== 'business_group')) continue;
      for (const cId of adj.get(b.id) || []) {
        const c = NODE_BY_ID.get(cId);
        if (!c) continue;
        if (c.type === 'media') {
          triangles.push([a.id, b.id, cId]);
        } else if (c.type === 'business_group' && b.type === 'businessman') {
          for (const dId of adj.get(cId) || []) {
            const d = NODE_BY_ID.get(dId);
            if (d?.type === 'media') triangles.push([a.id, b.id, cId, dId]);
          }
        }
      }
    }
  }
  return triangles;
}

/* ── D3 force graph rendering ─────────────────────────────────────────── */

let simulation = null;
let tooltip;

function ensureTooltip(stage) {
  if (tooltip) return tooltip;
  tooltip = document.createElement('div');
  tooltip.className = 'net-tooltip';
  tooltip.style.display = 'none';
  stage.appendChild(tooltip);
  return tooltip;
}

function nodeShapePath(n) {
  const r = n.r;
  switch (n.type) {
    case 'party':
      return `M ${-r} ${-r} L ${r} ${-r} L ${r} ${r} L ${-r} ${r} Z`;
    case 'media': {
      return `M 0 ${-r} L ${r} 0 L 0 ${r} L ${-r} 0 Z`;
    }
    case 'business_group': {
      const pts = [];
      for (let i=0; i<6; i++) {
        const a = (Math.PI/3) * i - Math.PI/2;
        pts.push(`${(Math.cos(a)*r).toFixed(2)} ${(Math.sin(a)*r).toFixed(2)}`);
      }
      return `M ${pts.join(' L ')} Z`;
    }
    default:
      return null; // use circle
  }
}

function drawNetwork() {
  const stage = document.getElementById('netStage');
  if (!stage) return;

  // Wipe old contents
  stage.innerHTML = '';
  ensureTooltip(stage);

  const W = stage.clientWidth;
  const H = stage.clientHeight;

  // Trace bar
  const traceBar = document.createElement('div');
  traceBar.className = 'trace-bar';
  traceBar.innerHTML = `
    <button id="traceToggle">${NET_STATE.traceMode ? 'Trace mode: ON' : 'Trace path'}</button>
    <span style="color:var(--text-disabled);">${NET_STATE.traceMode ? (NET_STATE.traceStart ? 'click target node…' : 'click source node…') : ''}</span>
    ${NET_STATE.pivotStack.length ? `<button id="pivotBack">← Pivot back</button>` : ''}
    ${NET_STATE.tracePath ? `<span class="clear" id="traceClear">clear</span>` : ''}
  `;
  stage.appendChild(traceBar);
  traceBar.querySelector('#traceToggle').onclick = () => {
    NET_STATE.traceMode = !NET_STATE.traceMode;
    NET_STATE.traceStart = null;
    NET_STATE.tracePath = null;
    if (!NET_STATE.traceMode) document.body.style.cursor = 'default';
    drawNetwork();
  };
  if (NET_STATE.pivotStack.length) {
    traceBar.querySelector('#pivotBack').onclick = () => {
      NET_STATE.pivot = NET_STATE.pivotStack.pop();
      drawNetwork();
    };
  }
  if (NET_STATE.tracePath) {
    traceBar.querySelector('#traceClear').onclick = () => {
      NET_STATE.tracePath = null;
      NET_STATE.traceStart = null;
      drawNetwork();
    };
  }
  traceBar.classList.toggle('on', false);
  if (NET_STATE.traceMode) traceBar.querySelector('#traceToggle').classList.add('on');

  // Side legend
  const legendBox = document.createElement('div');
  legendBox.className = 'legend-box';
  legendBox.innerHTML = `
    <div class="lbl">Nodes</div>
    <div class="row"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#e8edf3"/></svg> Politician</div>
    <div class="row"><svg width="14" height="14"><rect x="2" y="2" width="10" height="10" fill="var(--p-INC)"/></svg> Party</div>
    <div class="row"><svg width="14" height="14"><polygon points="7,1 13,7 7,13 1,7" fill="#f4b942"/></svg> Media</div>
    <div class="row"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#9b6fff"/></svg> Businessman</div>
    <div class="row"><svg width="14" height="14"><polygon points="7,1 12,4 12,10 7,13 2,10 2,4" fill="#6aa0ff"/></svg> Group</div>
    <div class="row"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="none" stroke="#888" stroke-dasharray="2,2"/></svg> Family</div>
    <div class="lbl" style="margin-top:8px;">Edges</div>
    <div class="row" style="color:var(--text-secondary);">owns <span style="color:var(--text-primary);">XX%</span></div>
    <div class="row" style="color:var(--text-secondary);">donor</div>
    <div class="row" style="color:var(--text-secondary);">advertising client</div>
    <div class="row" style="color:var(--text-secondary);">board member</div>
    <div class="row" style="color:var(--text-secondary);">family of</div>
    <div class="row" style="color:var(--text-secondary);">ally / coalition</div>
  `;
  stage.appendChild(legendBox);

  // SVG
  const svgEl = d3.select(stage).append('svg').attr('viewBox', `0 0 ${W} ${H}`);
  const root = svgEl.append('g');

  // Filter graph
  const g = filterGraph();
  if (!g.nodes.length) {
    svgEl.append('text').attr('x', W/2).attr('y', H/2).attr('text-anchor','middle')
         .attr('fill','#6b7888').style('font-family','JetBrains Mono, monospace').style('font-size','11px')
         .text('No nodes match current filters');
    return;
  }

  // Pin pivot to center
  g.nodes.forEach(n => {
    if (n.id === NET_STATE.pivot) {
      n.fx = W/2; n.fy = H/2; n.r = 16;
    } else {
      n.fx = null; n.fy = null;
    }
  });

  // Pan & zoom
  const zoom = d3.zoom().scaleExtent([0.4, 3]).on('zoom', ev => root.attr('transform', ev.transform));
  svgEl.call(zoom);

  // Trace path edge set
  const tracePathSet = new Set();
  if (NET_STATE.tracePath) {
    for (let i=0; i<NET_STATE.tracePath.length-1; i++) {
      tracePathSet.add(`${NET_STATE.tracePath[i]}|${NET_STATE.tracePath[i+1]}`);
      tracePathSet.add(`${NET_STATE.tracePath[i+1]}|${NET_STATE.tracePath[i]}`);
    }
  }

  function linkInPath(l) {
    const s = typeof l.source==='string'?l.source:l.source.id;
    const t = typeof l.target==='string'?l.target:l.target.id;
    return tracePathSet.has(`${s}|${t}`);
  }

  // Links
  const linkG = root.append('g').attr('stroke-linecap','round');
  const linkSel = linkG.selectAll('line').data(g.links).join('line')
    .attr('stroke', l => linkInPath(l) ? '#f4b942' : '#2c3848')
    .attr('stroke-width', l => linkInPath(l) ? 2.2 : (l.weight ? Math.min(1.8, 0.4 + l.weight/100) : 0.6))
    .attr('stroke-opacity', l => linkInPath(l) ? 1 : 0.6);

  // Edge labels (only show if zoomed in or for high-weight edges)
  const labelG = root.append('g');
  const labelSel = labelG.selectAll('text').data(g.links).join('text')
    .attr('class', l => 'edge-label' + (l.type==='owns' ? ' pct' : ''))
    .attr('text-anchor', 'middle')
    .text(l => {
      if (l.type === 'owns' && l.weight) return `${l.weight}%`;
      if (l.type === 'donor' && l.weight) return `₹${l.weight} cr`;
      if (l.type === 'loan / financial exposure' && l.weight) return `₹${l.weight} cr loan`;
      if (l.type === 'advertising client' && l.weight) return `ad ₹${l.weight} cr`;
      return l.type;
    });

  // Nodes
  const nodeG = root.append('g');
  const nodeSel = nodeG.selectAll('g').data(g.nodes).join('g')
    .style('cursor', 'pointer');

  nodeSel.each(function(n) {
    const grp = d3.select(this);
    const path = nodeShapePath(n);
    if (path) {
      grp.append('path').attr('d', path)
         .attr('fill', n.type === 'family' ? 'transparent' : n.color)
         .attr('stroke', n.id === NET_STATE.pivot ? '#fff' : (n.type === 'family' ? n.color : 'rgba(0,0,0,0.4)'))
         .attr('stroke-dasharray', n.type === 'family' ? '2,2' : null)
         .attr('stroke-width', n.id === NET_STATE.pivot ? 2 : 1);
    } else {
      grp.append('circle').attr('r', n.r)
         .attr('fill', n.type === 'family' ? 'transparent' : n.color)
         .attr('stroke', n.id === NET_STATE.pivot ? '#fff' : (n.type === 'family' ? n.color : 'rgba(0,0,0,0.4)'))
         .attr('stroke-dasharray', n.type === 'family' ? '2,2' : null)
         .attr('stroke-width', n.id === NET_STATE.pivot ? 2 : 1);
    }
    // Label
    grp.append('text').attr('class','node-label').attr('dy', n.r + 12).text(n.name);
  });

  // Drag
  const drag = d3.drag()
    .on('start', (ev, n) => { if (!ev.active) simulation.alphaTarget(0.3).restart(); n.fx = n.x; n.fy = n.y; })
    .on('drag',  (ev, n) => { n.fx = ev.x; n.fy = ev.y; })
    .on('end',   (ev, n) => { if (!ev.active) simulation.alphaTarget(0); if (n.id !== NET_STATE.pivot) { n.fx = null; n.fy = null; } });

  nodeSel.call(drag);

  // Hover dim
  nodeSel.on('mouseenter', function(ev, n) {
    const connected = new Set([n.id]);
    g.links.forEach(l => {
      const s = typeof l.source==='string'?l.source:l.source.id;
      const t = typeof l.target==='string'?l.target:l.target.id;
      if (s === n.id) connected.add(t);
      if (t === n.id) connected.add(s);
    });
    nodeSel.style('opacity', d => connected.has(d.id) ? 1 : 0.18);
    linkSel.style('opacity', l => {
      const s = typeof l.source==='string'?l.source:l.source.id;
      const t = typeof l.target==='string'?l.target:l.target.id;
      return (s === n.id || t === n.id) ? 1 : 0.06;
    });
    labelSel.style('opacity', l => {
      const s = typeof l.source==='string'?l.source:l.source.id;
      const t = typeof l.target==='string'?l.target:l.target.id;
      return (s === n.id || t === n.id) ? 1 : 0.05;
    });
    // Tooltip
    tooltip.style.display = 'block';
    tooltip.innerHTML = `
      <div class="ttip-type">${n.type.replace('_',' ')}${n.subType?` · ${n.subType}`:''}</div>
      <div class="ttip-name">${n.name}</div>
      ${n.sub ? `<div class="ttip-desc">${n.sub}</div>` : ''}
    `;
  })
  .on('mousemove', function(ev) {
    const rect = stage.getBoundingClientRect();
    tooltip.style.left = (ev.clientX - rect.left + 12) + 'px';
    tooltip.style.top  = (ev.clientY - rect.top + 12) + 'px';
  })
  .on('mouseleave', function() {
    nodeSel.style('opacity', 1);
    linkSel.style('opacity', l => linkInPath(l) ? 1 : 0.6);
    labelSel.style('opacity', 1);
    tooltip.style.display = 'none';
  })
  .on('click', function(ev, n) {
    if (NET_STATE.traceMode) {
      if (!NET_STATE.traceStart) {
        NET_STATE.traceStart = n.id;
      } else {
        NET_STATE.tracePath = shortestPath(NET_STATE.traceStart, n.id, adjacency(g.links));
        NET_STATE.traceMode = false;
      }
      drawNetwork();
    }
  })
  .on('dblclick', function(ev, n) {
    if (n.type === 'politician' && POLITICIANS[n.id]) {
      openPolitician(n.id);
      return;
    }
    // Pivot onto this node
    NET_STATE.pivotStack.push(NET_STATE.pivot);
    NET_STATE.pivot = n.id;
    drawNetwork();
  });

  // Edge hover tooltip
  linkSel.on('mouseenter', function(ev, l) {
    tooltip.style.display = 'block';
    const s = NODE_BY_ID.get(typeof l.source==='string'?l.source:l.source.id);
    const t = NODE_BY_ID.get(typeof l.target==='string'?l.target:l.target.id);
    tooltip.innerHTML = `
      <div class="ttip-type">${l.type}</div>
      <div class="ttip-name">${s?.name} → ${t?.name}</div>
      ${l.note ? `<div class="ttip-desc">${l.note}</div>` : ''}
      ${l.refSource ? `<div class="ttip-desc" style="font-family:'JetBrains Mono',monospace;color:var(--text-disabled);font-size:9px;">${l.refSource}</div>` : ''}
    `;
  })
  .on('mousemove', function(ev) {
    const rect = stage.getBoundingClientRect();
    tooltip.style.left = (ev.clientX - rect.left + 12) + 'px';
    tooltip.style.top  = (ev.clientY - rect.top + 12) + 'px';
  })
  .on('mouseleave', function() {
    tooltip.style.display = 'none';
  });

  // Force simulation
  simulation = d3.forceSimulation(g.nodes)
    .force('link',    d3.forceLink(g.links).id(d => d.id).distance(l => 80 + (l.type==='owns'?0:30)).strength(0.6))
    .force('charge',  d3.forceManyBody().strength(-340))
    .force('center',  d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide().radius(d => d.r + 8))
    .on('tick', ticked);

  function ticked() {
    linkSel
      .attr('x1', l => l.source.x).attr('y1', l => l.source.y)
      .attr('x2', l => l.target.x).attr('y2', l => l.target.y);
    labelSel
      .attr('x', l => (l.source.x + l.target.x) / 2)
      .attr('y', l => (l.source.y + l.target.y) / 2 - 2);
    nodeSel.attr('transform', n => `translate(${n.x},${n.y})`);
  }

  // Cursor for trace mode
  document.body.style.cursor = NET_STATE.traceMode ? 'crosshair' : 'default';
}

/* ── Shared interests companion table ─────────────────────────────────── */

function renderSharedInterests(politician) {
  const partyId = politician.party;
  // Donors to this party
  const donors = RELATIONSHIPS
    .filter(r => r.to === partyId && r.type === 'donor')
    .map(r => r.from);
  // Map businessman → all media outlets they have stakes in (direct or via business group)
  const businessmanMediaStake = new Map(); // bmId → [{mediaId, pct, via}]
  donors.forEach(bm => {
    const stakes = [];
    // Direct businessman→media? (uncommon in our data but support it)
    RELATIONSHIPS.filter(r => r.from === bm && r.type === 'owns').forEach(r => {
      const ent = ENTITIES[r.to];
      if (ent?.type === 'media') stakes.push({ media: r.to, pct: r.weight, via: 'direct' });
      if (ent?.type === 'business_group') {
        // group → media
        RELATIONSHIPS.filter(rr => rr.from === r.to && rr.type === 'owns').forEach(rr => {
          const ent2 = ENTITIES[rr.to];
          if (ent2?.type === 'media') stakes.push({ media: rr.to, pct: rr.weight, via: ent?.name });
        });
      }
    });
    if (stakes.length) businessmanMediaStake.set(bm, stakes);
  });
  // Party stake in each media: advertising client edges OR direct ownership
  const partyStakeInMedia = new Map(); // mediaId → {pct, kind, note}
  RELATIONSHIPS.filter(r => r.from === partyId && r.type === 'advertising client').forEach(r => {
    partyStakeInMedia.set(r.to, { kind: 'ad client', pct: r.weight, note: r.note });
  });
  // Build rows: for each businessman donor × each media they hold stake in × where party also has touch
  const rows = [];
  businessmanMediaStake.forEach((stakes, bm) => {
    stakes.forEach(s => {
      const partyInfo = partyStakeInMedia.get(s.media);
      if (!partyInfo) return; // require co-presence
      rows.push({
        media: ENTITIES[s.media]?.name,
        partyStake: `${partyInfo.kind} (₹${partyInfo.pct} cr)`,
        businessman: ENTITIES[bm]?.name,
        bmStake: `${s.pct}% ${s.via === 'direct' ? '' : `via ${s.via}`}`.trim(),
        notes: `${ENTITIES[s.media]?.subType || ''} · ${ENTITIES[s.media]?.description || ''}`
      });
    });
  });

  const tbl = document.getElementById('sharedTable');
  if (!rows.length) {
    tbl.innerHTML = `<p style="color:var(--text-tertiary);font-size:12px;">No co-stake overlaps found for this politician's party within the seeded data.</p>`;
    return;
  }
  let sortKey = 'media', sortAsc = true;
  function render() {
    const sorted = rows.slice().sort((a,b)=> {
      const av = (a[sortKey]||'').toString();
      const bv = (b[sortKey]||'').toString();
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
    tbl.innerHTML = `
      <table class="shared-table">
        <thead><tr>
          <th data-k="media">Media outlet</th>
          <th data-k="partyStake">Party stake / influence</th>
          <th data-k="businessman">Businessman</th>
          <th data-k="bmStake">Their stake</th>
          <th data-k="notes">Notes</th>
        </tr></thead>
        <tbody>${sorted.map(r => `
          <tr>
            <td>${r.media}</td>
            <td>${r.partyStake}</td>
            <td>${r.businessman}</td>
            <td class="pct">${r.bmStake}</td>
            <td>${r.notes}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    tbl.querySelectorAll('th').forEach(th => {
      th.onclick = () => {
        if (sortKey === th.dataset.k) sortAsc = !sortAsc;
        else { sortKey = th.dataset.k; sortAsc = true; }
        render();
      };
    });
  }
  render();
}
