<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neo Nīti Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ─────────────────────────────────────────────────────────────────────────
     Neo Nīti Atlas — Bloomberg Terminal meets newsroom
     ─────────────────────────────────────────────────────────────────────── */

  :root {
    --bg:               #07090c;
    --bg-elev-1:        #0e1218;
    --bg-elev-2:        #141a23;
    --bg-elev-3:        #232326; /* exact match for main app's --bg-tertiary — used by active tab pill */
    --border:           #1d2530;
    --border-strong:    #2c3848;
    --text-primary:     #e8edf3;
    --text-secondary:   #a6b1c0;
    --text-tertiary:    #6b7888;
    --text-disabled:    #475260;
    --accent:           #6aa0ff;
    --accent-dim:       rgba(106,160,255,0.18);
    --warn:             #f4b942;
    --good:             #2ecc71;
    --bad:              #e74c3c;
    --neutral:          #8a96a6;

    /* Party palette */
    --p-BJP:    #FF9933;
    --p-INC:    #19AAED;
    --p-AAP:    #0066CC;
    --p-DMK:    #E50000;
    --p-TMC:    #1B7A1B;
    --p-YSRCP:  #00BFFF;
    --p-BRS:    #FF69B4;
    --p-OTHER:  #888888;

    --panel-width:        420px;
    --panel-width-wide:   720px;
    --transition:         180ms ease-out;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::selection { background: var(--accent); color: #fff; }

  /* ── Globe canvas ────────────────────────────────────────────── */

  #globeViz {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* ── Top-left overlay ────────────────────────────────────────── */

  .top-overlay {
    position: absolute;
    top: 20px;
    left: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 460px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text-primary);
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-dim);
  }
  .brand .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.12em;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    text-transform: uppercase;
  }

  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .breadcrumb .sep { color: var(--text-disabled); }
  .breadcrumb .crumb {
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    transition: background var(--transition), color var(--transition);
  }
  .breadcrumb .crumb:hover { background: var(--bg-elev-2); color: var(--text-primary); }
  .breadcrumb .crumb.current { color: var(--accent); cursor: default; }

  .search-wrap {
    position: relative;
    width: 320px;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(14,18,24,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 12px 8px 30px;
    border-radius: 5px;
    outline: none;
    transition: border-color var(--transition);
  }
  .search-wrap input::placeholder { color: var(--text-disabled); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    top: 50%;
    left: 10px;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--text-disabled);
    pointer-events: none;
  }
  .search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--bg-elev-1);
    border: 1px solid var(--border);
    border-radius: 5px;
    max-height: 320px;
    overflow-y: auto;
    z-index: 12;
    display: none;
  }
  .search-results.open { display: block; }
  .search-results .res-item {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background var(--transition);
  }
  .search-results .res-item:hover { background: var(--bg-elev-2); }
  .search-results .res-item:last-child { border-bottom: none; }
  .search-results .res-name { color: var(--text-primary); font-size: 12px; }
  .search-results .res-meta { color: var(--text-tertiary); font-size: 10px; font-family: 'JetBrains Mono', monospace; }

  /* ── Bottom legend ───────────────────────────────────────────── */

  .legend {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(14,18,24,0.78);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }
  .legend-label {
    color: var(--text-disabled);
    text-transform: uppercase;
    font-size: 9px;
    margin-right: 4px;
  }
  .legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .legend-chip .sw {
    width: 9px; height: 9px; border-radius: 2px;
  }

  /* ── Status pill (corner) ────────────────────────────────────── */
  .status-pill {
    position: absolute;
    top: 20px;
    right: 24px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(14,18,24,0.78);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
  }
  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 8px var(--good);
  }

  /* ── Layer toggle (under status pill) ─────────────────────────────────── */
  .layer-toggle {
    position: absolute;
    top: 60px;
    right: 24px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(14,18,24,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }
  .layer-toggle button {
    background: transparent;
    border: none;
    color: var(--text-tertiary);
    font: inherit;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: color var(--transition), background var(--transition);
  }
  .layer-toggle button:hover { color: var(--text-primary); }
  .layer-toggle button.active {
    background: var(--bg-elev-2);
    color: var(--accent);
  }

  /* ── Constituency MP card (floats over globe when a PC is clicked) ───── */
  .pc-card {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    width: min(420px, 90vw);
    background: rgba(14,18,24,0.96);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 14px 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease-out, transform 200ms ease-out;
  }
  .pc-card.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  .pc-card.hidden { display: none; }
  .pc-card .pc-band { height: 3px; border-radius: 1px; margin: -14px -16px 12px; }
  .pc-card .pc-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .pc-card .pc-name {
    font-size: 14px;
    font-weight: 510;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .pc-card .pc-state {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .pc-card .pc-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-tertiary);
    width: 22px; height: 22px;
    border-radius: 3px;
    cursor: pointer;
    line-height: 1;
    font-size: 12px;
  }
  .pc-card .pc-close:hover { color: var(--text-primary); border-color: var(--border-strong); }
  .pc-card .mp-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: var(--bg-elev-2);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color var(--transition);
    border: 1px solid var(--border);
  }
  .pc-card .mp-row:hover { border-color: var(--accent); }
  .pc-card .mp-photo {
    width: 36px; height: 36px;
    background-size: cover;
    background-position: center;
    background-color: var(--bg-elev-3);
    border-radius: 4px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .pc-card .mp-meta { flex: 1; min-width: 0; }
  .pc-card .mp-name { font-size: 13px; color: var(--text-primary); font-weight: 510; }
  .pc-card .mp-sub  { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .pc-card .mp-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-primary);
    flex-shrink: 0;
    text-align: right;
  }
  .pc-card .mp-stat .lbl {
    color: var(--text-disabled);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .pc-card .no-mp {
    padding: 14px;
    background: var(--bg-elev-2);
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-tertiary);
    font-size: 12px;
    text-align: center;
    line-height: 1.5;
  }

  /* ── Right-side panel ────────────────────────────────────────── */

  .panel {
    position: absolute;
    top: 0; right: 0;
    height: 100vh;
    width: var(--panel-width);
    background: var(--bg-elev-1);
    border-left: 1px solid var(--border);
    z-index: 20;
    transform: translateX(100%);
    opacity: 0;
    transition: transform var(--transition), opacity var(--transition), width var(--transition);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel.open { transform: translateX(0); opacity: 1; }
  .panel.wide { width: var(--panel-width-wide); }

  /* ── Left-side panel (party details) ─────────────────────────── */

  .panel-left {
    position: absolute;
    top: 0; left: 0;
    height: 100vh;
    width: var(--panel-width);
    background: var(--bg-elev-1);
    border-right: 1px solid var(--border);
    z-index: 20;
    transform: translateX(-100%);
    opacity: 0;
    transition: transform var(--transition), opacity var(--transition);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-left.open { transform: translateX(0); opacity: 1; }

  /* Party panel-specific bits */
  .party-banner {
    padding: 18px 22px 16px;
    border-bottom: 1px solid var(--border);
  }
  .party-banner .swatch {
    width: 28px; height: 28px;
    border-radius: 4px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 10px;
    box-shadow: 0 0 0 1px var(--border-strong) inset;
  }
  .party-banner .full-name {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 10px;
    line-height: 1.2;
  }
  .party-banner .short {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  .state-rule-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .state-rule-grid .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    background: var(--bg-elev-2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
  }
  .state-rule-grid .pill.active { color: var(--accent); border-color: var(--accent); }
  .state-rule-grid .pill:hover { color: var(--text-primary); border-color: var(--border-strong); }

  .promise-list { margin-top: 8px; }
  .promise-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .promise-item:last-child { border-bottom: none; }
  .promise-item .ptitle { font-size: 12px; color: var(--text-primary); line-height: 1.4; }
  .promise-item .pmeta {
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elev-1);
    flex-shrink: 0;
  }
  .panel-header .nav-btns {
    display: flex; gap: 6px;
  }
  .panel-header button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-tertiary);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 3px;
    transition: background var(--transition), color var(--transition), border-color var(--transition);
  }
  .panel-header button:hover {
    background: var(--bg-elev-2);
    color: var(--text-primary);
    border-color: var(--border-strong);
  }
  .panel-header .level {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-disabled);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px 32px;
  }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .panel-body.fade-in { animation: fadeSlide 200ms ease-out; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Reusable elements ───────────────────────────────────────── */

  .h-serif {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.015em;
  }
  .h1 { font-size: 28px; }
  .h2 { font-size: 20px; }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-disabled);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .party-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px 2px 6px;
    border-radius: 2px;
    border: 1px solid transparent;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .party-chip .sq {
    width: 7px; height: 7px; border-radius: 1px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 14px 0;
  }
  .stat {
    background: var(--bg-elev-1);
    padding: 10px 12px;
  }
  .stat .v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .stat .k {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .section { margin-top: 22px; }
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-tertiary);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* CM card */
  .cm-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-top: 12px;
    cursor: pointer;
    transition: border-color var(--transition);
  }
  .cm-card:hover { border-color: var(--accent); }
  .cm-card .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg-elev-1);
    border: 1px solid var(--border);
    background-size: cover; background-position: center;
    flex-shrink: 0;
  }
  .cm-card .info .name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .cm-card .info .role { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

  /* Org chart */
  .tree {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .tree .node { cursor: pointer; padding: 1px 4px; border-radius: 2px; }
  .tree .node:hover { background: var(--bg-elev-2); color: var(--text-primary); }
  .tree .leaf { color: var(--text-tertiary); padding-left: 16px; cursor: pointer; }
  .tree .leaf:hover { color: var(--accent); }
  .tree .toggle { color: var(--text-disabled); width: 12px; display: inline-block; }
  .tree .children { padding-left: 16px; border-left: 1px solid var(--border); margin-left: 6px; }

  /* News list */
  .news-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .news-item:last-child { border-bottom: none; }
  .news-item .headline { font-size: 12px; color: var(--text-primary); line-height: 1.4; }
  .news-item .meta {
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sent-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .sent-pos { background: var(--good); }
  .sent-neg { background: var(--bad); }
  .sent-neu { background: var(--neutral); }

  /* ── Left-panel tabs (Organisation / News / Donations) ────────────────── */
  .left-tab-body { padding-top: 14px; animation: tabFade 180ms ease-out; }

  /* Org chart — boxes & connectors */
  .org-chart { display: flex; flex-direction: column; align-items: center; gap: 0; margin-top: 4px; }
  .org-box {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    text-align: center;
    min-width: 0;
    max-width: 100%;
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition);
  }
  .org-box:hover { border-color: var(--accent); background: rgba(94,106,210,0.08); }
  .org-box.head { border-color: var(--accent); background: rgba(94,106,210,0.10); }
  .org-box .role-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--text-disabled);
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .org-box .name { font-size: 12px; color: var(--text-primary); font-weight: 510; line-height: 1.25; }
  .org-box .sub { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
  .org-connector { width: 1px; height: 14px; background: var(--border); }
  .org-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }
  .org-row .org-box { flex: 1 1 calc(50% - 6px); min-width: 110px; }
  .org-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    margin-top: 0;
  }
  .org-group-title {

// PC-name → party color (uses STATE_PARTY of the parent state as a proxy
// until we wire in PC-level winner data from ECI 2024 results).
function pcPartyColor(props) {
  // Prefer real winner if exposed in props (after winners-merge); else state proxy
  const stateProxy = STATE_PARTY[props.st_name] || 'OTHER';
  const code = props.winner_party || stateProxy;
  return (PARTIES[code] || PARTIES.OTHER).color;
}

function getStateName(props) {
  // Handle multiple possible property keys in different GeoJSON sources
  return props.ST_NM || props.NAME_1 || props.st_nm || props.STATE || props.state || props.name || props.STATE_NAME || 'Unknown';
}

function partyForState(stateName) {
  return STATE_PARTY[stateName] || 'OTHER';
}

function partyColor(stateName) {
  const code = partyForState(stateName);
  return PARTIES[code].color;
}

const NAV_STATE = {
  level:        'india',     // 'india' | 'state' | 'constituency' | 'politician'
  stateName:    null,
  constituency: null,
  politicianId: null,
  hoveredFeature: null,
  selectedFeature: null,
  tab:          'overview'
};

let myGlobe;
let stateFeatures = [];

async function initGlobe() {
  myGlobe = Globe()(document.getElementById('globeViz'))
    .globeImageUrl('/atlas-assets/earth-dark.jpg')
    .bumpImageUrl('/atlas-assets/earth-topology.png')
    .backgroundImageUrl('/atlas-assets/night-sky.png')
    .showAtmosphere(true)
    .atmosphereColor('#3a5d8a')
    .atmosphereAltitude(0.18)
    .polygonAltitude(f => f === NAV_STATE.selectedFeature ? 0.025 : (f === NAV_STATE.hoveredFeature ? 0.018 : 0.01))
    .polygonCapColor(f => {
      const c = partyColor(getStateName(f.properties));
      if (f === NAV_STATE.selectedFeature) return c;
      if (f === NAV_STATE.hoveredFeature)  return c;
      return hexA(c, 0.55);
    })
    .polygonSideColor(() => 'rgba(0,0,0,0.15)')
    .polygonStrokeColor(f => f === NAV_STATE.selectedFeature ? '#fff' : (f === NAV_STATE.hoveredFeature ? '#e8edf3' : '#1d2530'))
    .polygonLabel(f => {
      const n = getStateName(f.properties);
      const p = partyForState(n);
      return `
        <div style="background:rgba(7,9,12,0.95);border:1px solid #2c3848;border-radius:4px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#e8edf3;">
          <div style="font-weight:600;margin-bottom:2px;">${n}</div>
          <div style="color:#a6b1c0;font-size:10px;">
            <span style="display:inline-block;width:8px;height:8px;background:${PARTIES[p].color};border-radius:1px;vertical-align:middle;margin-right:5px"></span>
            ${PARTIES[p].name}
          </div>
        </div>`;
    })
    .onPolygonHover(f => {
      NAV_STATE.hoveredFeature = f;
      document.body.style.cursor = f ? 'pointer' : 'default';
      myGlobe.polygonAltitude(myGlobe.polygonAltitude())
             .polygonCapColor(myGlobe.polygonCapColor())
             .polygonStrokeColor(myGlobe.polygonStrokeColor());
    })
    .onPolygonClick(f => {
      const name = getStateName(f.properties);
      if (STATES[name]) {
        openState(name, f);
      } else {
        // Fallback for states without sample data
        openState(name, f, true);
      }
    });

  myGlobe.pointOfView({ lat: 22, lng: 79, altitude: 1.8 }, 0);

  // Load GeoJSON (local first; falls back to remote gist if missing)
  let geo;
  try {
    geo = await fetch(GEOJSON_URL).then(r => r.json());
  } catch (e) {
    console.warn('Primary GeoJSON failed, trying fallback', e);
    geo = await fetch(FALLBACK_GEOJSON).then(r => r.json());
  }

  stateFeatures = geo.features;
  myGlobe.polygonsData(stateFeatures);

  // Fly into India
  setTimeout(() => {
    myGlobe.pointOfView({ lat: 22, lng: 79, altitude: 0.9 }, 1500);
    document.getElementById('loading').classList.add('hidden');
  }, 400);

  wireLayerToggle();
}

// Map GeoJSON st_name (full name) → 2-letter code used by MP_MARQUEE
function normaliseStCode(stName) {
  const map = {
    'Andhra Pradesh': 'AP', 'Arunachal Pradesh': 'AR', 'Assam': 'AS',
    'Bihar': 'BR', 'Chhattisgarh': 'CG', 'Goa': 'GA', 'Gujarat': 'GJ',
    'Haryana': 'HR', 'Himachal Pradesh': 'HP', 'Jharkhand': 'JH',
    'Karnataka': 'KA', 'Kerala': 'KL', 'Madhya Pradesh': 'MP',
    'Maharashtra': 'MH', 'Manipur': 'MN', 'Meghalaya': 'ML',
    'Mizoram': 'MZ', 'Nagaland': 'NL', 'Odisha': 'OD', 'Punjab': 'PB',
    'Rajasthan': 'RJ', 'Sikkim': 'SK', 'Tamil Nadu': 'TN',
    'Telangana': 'TG', 'Tripura': 'TR', 'Uttar Pradesh': 'UP',
    'Uttarakhand': 'UK', 'West Bengal': 'WB', 'Delhi': 'DL',
    'NCT of Delhi': 'DL', 'Chandigarh': 'CH', 'Puducherry': 'PY',
    'Jammu & Kashmir': 'JK', 'Jammu and Kashmir': 'JK',
    'Ladakh': 'LA', 'Andaman & Nicobar Islands': 'AN',
    'Dadra and Nagar Haveli and Daman and Diu': 'DN',
    'Lakshadweep': 'LD'
  };
  return map[stName] || stName;
}

  const p = feature.properties;
  const partyCol = pcPartyColor(p);
  const stCode = normaliseStCode(p.st_name);
  const mp = MP_BY_PC[`${stCode}|${_normPc(p.pc_name)}`];

  document.getElementById('pcBand').style.background = partyCol;
  document.getElementById('pcName').textContent = `${p.pc_name} · LS ${p.pc_no}`;
  document.getElementById('pcState').textContent = `${p.st_name} · ${p.pc_category}`;

  const body = document.getElementById('pcBody');
  if (mp) {
    body.innerHTML = `
      <div class="mp-row" data-mp-slug="${mp.slug}">
        <div class="mp-photo"${mp.photo ? ` style="background-image:url('${mp.photo}');"` : ''}></div>
        <div class="mp-meta">
          <div class="mp-name">${mp.name}</div>
          <div class="mp-sub">
            <span class="party-chip" style="background:${hexA(partyCol, 0.18)};color:${partyCol};border-color:${hexA(partyCol, 0.35)};padding:1px 5px;font-size:9px;">
              <span class="sq" style="background:${partyCol};width:5px;height:5px;"></span>${mp.party}
            </span>
            <span style="margin-left:6px;">18th LS</span>
          </div>
        </div>
        <div class="mp-stat">
          <div class="lbl">Attendance</div>
          <div>${mp.attendance != null ? mp.attendance + '%' : (mp.exempt || '—')}</div>
        </div>
      </div>
      <div style="margin-top:8px;font-size:10px;color:var(--text-disabled);text-align:right;">
        Click row → full PRS profile (opens in app)
      </div>`;
    body.querySelector('.mp-row').addEventListener('click', () => {
      // Atlas runs inside an iframe in /atlas; navigate the *parent* window so
      // the user lands on the full /mp/[slug] page in the main app.
      const url = `/mp/${mp.slug}`;
      try {
        if (window.parent && window.parent !== window) window.parent.location.href = url;
        else window.location.href = url;
      } catch (e) { window.location.href = url; }
    });
  } else {
    body.innerHTML = `
      <div class="no-mp">
        <strong style="color:var(--text-secondary);">${p.pc_name}</strong> — no marquee MP record yet.<br/>
        The PRS scraper is currently ingesting all 543 LS MPs in the background.
        Re-check after the scrape completes (~100 min).
      </div>`;
  }

  document.getElementById('pcCard').classList.remove('hidden');
  setTimeout(() => document.getElementById('pcCard').classList.add('open'), 10);

  // Fly the globe to the centre of the polygon
  try {
    const c = featureCentroid(feature);
    if (c) myGlobe.pointOfView({ lat: c.lat, lng: c.lng, altitude: 0.45 }, 1200);
  } catch (e) { /* ignore */ }
}

function closePcCard() {
  const el = document.getElementById('pcCard');
  if (!el) return;
  el.classList.remove('open');
  setTimeout(() => el.classList.add('hidden'), 200);
}

function wireLayerToggle() {
  document.getElementById('layerStatesBtn').addEventListener('click', () => {
    document.getElementById('layerStatesBtn').classList.add('active');
    document.getElementById('layerPcsBtn').classList.remove('active');
    applyStateLayer();
  });
  document.getElementById('layerPcsBtn').addEventListener('click', () => {
    document.getElementById('layerPcsBtn').classList.add('active');
    document.getElementById('layerStatesBtn').classList.remove('active');
    applyPcLayer();
  });
  document.getElementById('pcClose').addEventListener('click', closePcCard);
}

// Convert hex → rgba string with alpha
function hexA(hex, a) {
  const c = hex.replace('#', '');
  const r = parseInt(c.slice(0,2), 16);
  const g = parseInt(c.slice(2,4), 16);
  const b = parseInt(c.slice(4,6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// Find a feature by state name (for search)
function findFeatureByState(name) {
  return stateFeatures.find(f => getStateName(f.properties) === name);
}

// Compute centroid lat/lng of a feature (approx — for camera target)
function featureCentroid(f) {
  if (!f) return null;
  const coords = [];
  const walk = a => {
    if (typeof a[0] === 'number') coords.push(a);
    else a.forEach(walk);
  };
  walk(f.geometry.coordinates);
  let lat = 0, lng = 0;
  coords.forEach(([x, y]) => { lng += x; lat += y; });
  return { lat: lat / coords.length, lng: lng / coords.length };
}

/* Render the party panel for a given party code.
   Shows: colour swatch, full name, short code, ideology blurb,
   list of states ruled (clickable), and headline manifesto promises. */
function renderPartyPanel(partyCode, currentStateName) {
  const party = PARTIES[partyCode];
  if (!party) {
    renderLeftBody(`<p style="color:var(--text-tertiary);font-size:12px;">No party info.</p>`);
    openLeftPanel();
    return;
  }

  // States this party rules
  const ruled = Object.entries(STATE_PARTY)
    .filter(([, code]) => code === partyCode)
    .map(([s]) => s)
    .sort();

  const ruledHtml = ruled.length
    ? `<div class="state-rule-grid">
        ${ruled.map(s => `
          <span class="pill${s === currentStateName ? ' active' : ''}" data-go-state="${s}">${s}</span>
        `).join('')}
      </div>`
    : `<p style="color:var(--text-tertiary);font-size:12px;">No states currently ruled.</p>`;

  // Headline promises from PARTY_PROMISES (if seeded)
  const promises = (typeof PARTY_PROMISES === 'object' && PARTY_PROMISES[partyCode]) || [];
  const promisesHtml = promises.length
    ? `<div class="promise-list">
        ${promises.map(p => `
          <div class="promise-item">
            <div class="ptitle">${p.title}</div>
            ${p.tag ? `<div class="pmeta">${p.tag}</div>` : ''}
          </div>
        `).join('')}
      </div>`
    : `<p style="color:var(--text-tertiary);font-size:12px;">No headline promises in demo data.</p>`;

  const ideology = (typeof PARTY_IDEOLOGY === 'object' && PARTY_IDEOLOGY[partyCode]) || '';

  renderLeftBody(`
    <div class="party-banner">
      <span class="swatch" style="background:${party.color};"></span>
      <span class="party-chip" style="background:${hexA(party.color, 0.18)};color:${party.color};border-color:${hexA(party.color, 0.35)};">
        <span class="sq" style="background:${party.color}"></span>${party.short}
      </span>
      <div class="full-name">${party.name}</div>
      ${ideology ? `<div class="short">${ideology}</div>` : ''}
    </div>
    <div style="padding: 18px 22px 24px;">
      <div class="section" style="margin-top:0;">
        <div class="section-title">States ruled <span class="mono" style="color:var(--text-disabled);">${ruled.length}</span></div>
        ${ruledHtml}
      </div>
      <div class="section">
        <div class="section-title">Headline manifesto promises</div>
        ${promisesHtml}
      </div>
    </div>
  `);

  // Wire state pills
  panelLeftBody.querySelectorAll('[data-go-state]').forEach(el => {
    el.addEventListener('click', () => {
      const s = el.dataset.goState;
      const feat = findFeatureByState(s);
      if (feat) openState(s, feat);
    });
  });

  openLeftPanel();
}

function updateBreadcrumb() {
  const crumbs = [`<span class="crumb${NAV_STATE.level==='india'?' current':''}" data-go="india">India</span>`];
  if (NAV_STATE.stateName) {
    crumbs.push(`<span class="sep">›</span>`);
    crumbs.push(`<span class="crumb${NAV_STATE.level==='state'?' current':''}" data-go="state">${NAV_STATE.stateName}</span>`);
  }
  if (NAV_STATE.constituency) {
    crumbs.push(`<span class="sep">›</span>`);
    crumbs.push(`<span class="crumb${NAV_STATE.level==='constituency'?' current':''}" data-go="constituency">${NAV_STATE.constituency}</span>`);
  }
  if (NAV_STATE.politicianId) {
    const p = POLITICIANS[NAV_STATE.politicianId];
    if (p) {
      crumbs.push(`<span class="sep">›</span>`);
      crumbs.push(`<span class="crumb${NAV_STATE.level==='politician'?' current':''}" data-go="politician">${p.name}</span>`);
    }
  }
  if (breadcrumbEl) {
    breadcrumbEl.innerHTML = crumbs.join(' ');
    breadcrumbEl.querySelectorAll('.crumb').forEach(el => {
      el.addEventListener('click', () => {
        const tgt = el.dataset.go;
        if (tgt === 'india') closePanel();
        if (tgt === 'state' && NAV_STATE.stateName) openState(NAV_STATE.stateName, findFeatureByState(NAV_STATE.stateName));
        if (tgt === 'constituency' && NAV_STATE.constituency) openConstituency(NAV_STATE.stateName, NAV_STATE.constituency);
        if (tgt === 'politician' && NAV_STATE.politicianId) openPolitician(NAV_STATE.politicianId);
      });
    });
  }

  // Update level indicator
  levelInd.textContent = ({
    india: 'INDIA',
    state: 'LEVEL 1 · STATE',
    constituency: 'LEVEL 2 · CONSTITUENCY',
    politician: 'LEVEL 3 · POLITICIAN'
  })[NAV_STATE.level];
}
